<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Issues</title>
  </head>
  <body class="bg-[#F8FAFC]">
    <!-- Header Section -->
    <div class="navbar bg-base-100 shadow-sm">
      <div
        class="flex flex-col md:flex-row items-center w-full mx-auto gap-4 p-1 md:px-20"
      >
        <div class="flex-1 flex items-center gap-2">
          <img
            src="./assets/github-logo.png"
            alt=""
            width="35px"
            height="35px"
          />
          <a class="text-xl font-semibold">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2 items-center">
          <input
            id="search_input"
            type="text"
            placeholder="Search"
            class="input input-bordered w-auto"
          />
          <button onclick="searchIssue()" class="btn btn-primary">
            Search
          </button>
        </div>
      </div>
    </div>
    <!-- Header Section -->

    <!-- Issue Status Section -->
    <section class="my-5 md:mt-10">
      <div class="p-6 md:mx-20 md:rounded-lg bg-white drop-shadow-sm mx-auto">
        <div class="grid grid-cols-3 md:w-1/3 gap-2" id="category">
          <button class="btn btn-sm bg-primary text-white">All</button>
          <button class="btn btn-sm text-gray-500">Open</button>
          <button class="btn btn-sm text-gray-500">Closed</button>
        </div>
      </div>
    </section>
    <!-- Issue Status Section -->

    <!-- Issues Section -->
    <section>
      <div class="md:mx-20 bg-white drop-shadow-sm md:rounded-lg">
        <div class="flex items-center gap-2 p-6">
          <div
            class="bg-[#ECE4FF] w-[50px] h-[50px] flex items-center justify-center rounded-full"
          >
            <img
              src="assets/Aperture.png"
              alt="Aperture"
              width="32px"
              height="32px"
            />
          </div>
          <div class="flex-1 flex flex-col justify-center">
            <h1
              class="font-semibold text-[20px] text-[#1F2937]"
              id="issue_count"
            >
              0 Issues
            </h1>
            <p class="font-normal text-[16px] text-gray-500">
              Track and manage your project issues
            </p>
          </div>
          <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 rounded-full bg-green-600"></div>
              <div>Open</div>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 rounded-full bg-purple-600"></div>
              Close
            </div>
          </div>
        </div>
        <div class="p-4 bg-[#FBFBFB] border-t border-t-gray-200">
          <div
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 mx-auto gap-4"
            id="issue_container"
          ></div>
        </div>
      </div>
    </section>
    <!-- Issues Section -->

    <!-- Issue Modal -->
    <dialog class="modal" id="modal_div"></dialog>
    <!-- Issue Modal -->
  </body>
  <script src="scripts/main.js"></script>
</html>
